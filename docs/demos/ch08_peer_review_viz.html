<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { width:100%; height:100%; font-family:'Noto Sans KR',sans-serif; background:#ffffff; overflow:hidden; }
  #chart { width:100%; height:100%; }
</style>
</head>
<body>
<div id="chart"></div>
<script>
const dimensions = ['질문 명확성', '데이터 적절성', '분석 논리', '시각화 품질', '해석 타당성'];

// 첫 값을 마지막에 반복해서 레이더 닫기
const closedDimensions = [...dimensions, dimensions[0]];

const groupA = [8, 6, 7, 5, 8, 8];
const groupB = [6, 8, 8, 7, 5, 6];
const groupC = [7, 7, 5, 8, 7, 7];

// 모바일 감지
const isMobile = window.innerWidth < 600;

const data = [
  {
    type: 'scatterpolar',
    r: groupA,
    theta: closedDimensions,
    fill: 'toself',
    fillcolor: 'rgba(99,102,241,0.12)',
    line: { color: '#6366f1', width: 2.5 },
    marker: { color: '#6366f1', size: isMobile ? 5 : 7 },
    name: 'A모둠',
    hovertemplate: 'A모둠<br>%{theta}: %{r}점<extra></extra>'
  },
  {
    type: 'scatterpolar',
    r: groupB,
    theta: closedDimensions,
    fill: 'toself',
    fillcolor: 'rgba(139,92,246,0.12)',
    line: { color: '#8b5cf6', width: 2.5 },
    marker: { color: '#8b5cf6', size: isMobile ? 5 : 7 },
    name: 'B모둠',
    hovertemplate: 'B모둠<br>%{theta}: %{r}점<extra></extra>'
  },
  {
    type: 'scatterpolar',
    r: groupC,
    theta: closedDimensions,
    fill: 'toself',
    fillcolor: 'rgba(6,182,212,0.12)',
    line: { color: '#06b6d4', width: 2.5 },
    marker: { color: '#06b6d4', size: isMobile ? 5 : 7 },
    name: 'C모둠',
    hovertemplate: 'C모둠<br>%{theta}: %{r}점<extra></extra>'
  }
];

const layout = {
  title: {
    text: '모둠별 피어리뷰 평가 결과',
    font: { family: 'Noto Sans KR', size: isMobile ? 16 : 20, weight: 700, color: '#1e1b4b' },
    y: 0.97
  },
  polar: {
    radialaxis: {
      visible: true,
      range: [0, 10],
      dtick: 2,
      tickfont: { family: 'Noto Sans KR', size: isMobile ? 9 : 11, color: '#6b7280' },
      gridcolor: '#f0f0f5',
      linecolor: '#e0e7ff'
    },
    angularaxis: {
      tickfont: { family: 'Noto Sans KR', size: isMobile ? 10 : 13, weight: 600, color: '#1e1b4b' },
      linecolor: '#e0e7ff',
      gridcolor: '#f0f0f5'
    },
    bgcolor: '#fafbfe'
  },
  legend: {
    font: { family: 'Noto Sans KR', size: isMobile ? 11 : 13, color: '#1e1b4b' },
    x: isMobile ? 0.3 : 0.85,
    y: isMobile ? -0.15 : 0.95,
    orientation: isMobile ? 'h' : 'v',
    bgcolor: 'rgba(255,255,255,0.95)',
    bordercolor: '#f0f0f5',
    borderwidth: 1
  },
  margin: isMobile
    ? { l: 30, r: 30, t: 55, b: 50 }
    : { l: 60, r: 60, t: 70, b: 40 },
  paper_bgcolor: '#ffffff'
};

Plotly.newPlot('chart', data, layout, { responsive: true, displayModeBar: false });
</script>
</body>
</html>
