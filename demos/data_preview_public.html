<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>서울 월별 기온 데이터</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: #f8f9fa;
    display: flex;
    justify-content: center;
    padding: 40px 20px;
    min-height: 100vh;
  }
  .container {
    background: #fff;
    border-radius: 16px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    padding: 32px;
    width: 100%;
    max-width: 760px;
  }
  h1 {
    font-size: 1.3rem;
    font-weight: 700;
    color: #1a1a2e;
    margin-bottom: 6px;
  }
  .subtitle {
    font-size: 0.9rem;
    color: #6c757d;
    margin-bottom: 20px;
  }
  .table-wrap {
    overflow-x: auto;
    border-radius: 10px;
    border: 1px solid #e9ecef;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.9rem;
    white-space: nowrap;
  }
  thead {
    position: sticky;
    top: 0;
    z-index: 2;
  }
  th {
    background: #2ec4b6;
    color: #fff;
    padding: 12px 18px;
    text-align: center;
    font-weight: 500;
    cursor: pointer;
    user-select: none;
    transition: background 0.2s;
  }
  th:hover {
    background: #26b0a3;
  }
  th .sort-icon {
    margin-left: 4px;
    font-size: 0.75rem;
    opacity: 0.6;
  }
  th.asc .sort-icon::after { content: ' ▲'; opacity: 1; }
  th.desc .sort-icon::after { content: ' ▼'; opacity: 1; }
  th:not(.asc):not(.desc) .sort-icon::after { content: ' ⇅'; }
  td {
    padding: 10px 18px;
    text-align: center;
    color: #333;
    border-bottom: 1px solid #f0f0f0;
  }
  tr:nth-child(even) td {
    background: #f4fffe;
  }
  tr:hover td {
    background: #e6f9f7;
  }
  .temp-high { color: #e63946; font-weight: 500; }
  .temp-low { color: #4361ee; font-weight: 500; }
  .footer {
    text-align: center;
    padding: 16px;
    font-size: 0.88rem;
    color: #868e96;
    font-style: italic;
  }
</style>
</head>
<body>
<div class="container">
  <h1>🌡️ 서울 월별 기온 데이터 (2015-2025)</h1>
  <p class="subtitle">정렬하려면 열 제목을 클릭하세요 | 출처: 기상청</p>
  <div class="table-wrap">
    <table id="dataTable">
      <thead>
        <tr>
          <th data-col="0">연도<span class="sort-icon"></span></th>
          <th data-col="1">월<span class="sort-icon"></span></th>
          <th data-col="2">평균기온(℃)<span class="sort-icon"></span></th>
          <th data-col="3">최고기온(℃)<span class="sort-icon"></span></th>
          <th data-col="4">최저기온(℃)<span class="sort-icon"></span></th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>
  <div class="footer">... 외 108건 더 보기</div>
</div>

<script>
(function() {
  // Realistic Seoul monthly average temperatures (approximate)
  // [avg, high, low] per month
  const baseline = [
    [-2.4, 1.5, -5.9],   // 1월
    [0.4, 4.7, -3.1],    // 2월
    [5.7, 10.8, 1.2],    // 3월
    [12.5, 18.0, 7.5],   // 4월
    [17.8, 23.5, 12.8],  // 5월
    [22.2, 27.2, 18.2],  // 6월
    [24.9, 29.0, 21.8],  // 7월
    [25.7, 30.2, 22.4],  // 8월
    [21.2, 26.1, 17.0],  // 9월
    [14.8, 20.2, 10.3],  // 10월
    [7.2, 12.0, 3.2],    // 11월
    [0.4, 4.3, -3.2]     // 12월
  ];

  let seed = 77;
  function rand() { seed = (seed * 16807 + 0) % 2147483647; return seed / 2147483647; }
  function vary(base, range) { return +(base + (rand() - 0.5) * range).toFixed(1); }

  const rows = [];

  for (let year = 2015; year <= 2016; year++) {
    for (let month = 1; month <= 12; month++) {
      const b = baseline[month - 1];
      // Slight warming trend: +0.05 per year from 2015
      const offset = (year - 2015) * 0.05;
      const avg = vary(b[0] + offset, 2.0);
      const high = vary(b[1] + offset, 2.5);
      const low = vary(b[2] + offset, 2.0);
      rows.push([year, month, avg, Math.max(avg, high), Math.min(avg, low)]);
    }
  }

  const tbody = document.getElementById('tableBody');
  let currentData = [...rows];

  function renderTable(data) {
    tbody.innerHTML = '';
    data.forEach(row => {
      const tr = document.createElement('tr');
      row.forEach((cell, idx) => {
        const td = document.createElement('td');
        td.textContent = cell;
        if (idx === 3) td.className = 'temp-high';
        if (idx === 4) td.className = 'temp-low';
        tr.appendChild(td);
      });
      tbody.appendChild(tr);
    });
  }

  renderTable(currentData);

  // Sort logic
  let sortCol = -1;
  let sortDir = 'none';

  document.querySelectorAll('th').forEach(th => {
    th.addEventListener('click', function() {
      const col = parseInt(this.dataset.col);

      document.querySelectorAll('th').forEach(h => {
        h.classList.remove('asc', 'desc');
      });

      if (sortCol === col) {
        sortDir = sortDir === 'asc' ? 'desc' : sortDir === 'desc' ? 'none' : 'asc';
      } else {
        sortCol = col;
        sortDir = 'asc';
      }

      if (sortDir === 'none') {
        currentData = [...rows];
      } else {
        currentData = [...rows].sort((a, b) => {
          return sortDir === 'asc' ? a[col] - b[col] : b[col] - a[col];
        });
      }

      if (sortDir !== 'none') {
        this.classList.add(sortDir);
      }

      renderTable(currentData);
    });
  });
})();
</script>
</body>
</html>
