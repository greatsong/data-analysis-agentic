<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { width:100%; height:100%; font-family:'Noto Sans KR',sans-serif; background:#ffffff; overflow:hidden; }
  #chart { width:100%; height:calc(100% - 48px); }
  #infoBar {
    position:fixed; bottom:0; left:0; right:0; height:48px;
    background:linear-gradient(135deg,#f8faff 0%,#eef2ff 100%);
    border-top:1px solid #e0e7ff;
    display:flex; align-items:center; justify-content:center; gap:28px;
    font-size:13px; z-index:10;
  }
  .stat-item { display:flex; align-items:center; gap:6px; }
  .stat-label { color:#6b7280; font-weight:400; font-size:12px; }
  .stat-value { color:#1e1b4b; font-weight:700; font-size:14px; transition:color 0.4s; }
  .stat-value.improved { color:#059669; }
  .stat-divider { width:1px; height:20px; background:#c7d2fe; }
  @media(max-width:600px){
    #infoBar{gap:10px;height:42px;font-size:11px}
    .stat-label{font-size:10px}.stat-value{font-size:12px}
    #chart{height:calc(100% - 42px)}
  }
</style>
</head>
<body>
<div id="chart"></div>
<div id="infoBar">
  <div class="stat-item"><span class="stat-label">데이터</span><span class="stat-value" id="sN">36개</span></div>
  <div class="stat-divider"></div>
  <div class="stat-item"><span class="stat-label">R²</span><span class="stat-value" id="sR2">0.102</span></div>
  <div class="stat-divider"></div>
  <div class="stat-item"><span class="stat-label">r</span><span class="stat-value" id="sR">-0.32</span></div>
  <div class="stat-divider"></div>
  <div class="stat-item"><span class="stat-label">변화</span><span class="stat-value" id="sDelta">-</span></div>
</div>
<script>
const rawX=[1.5,2,2.5,3,3.5,4,4.5,5,5.5,6,6.5,7,7.5,8,1,2.2,3.3,4.1,5.2,6.3,7.1,3.8,4.6,5.8,2.7,6.8,1.8,4.3,0.5,9,8.5,0.2,10,7.8,1.2,9.5];
const rawY=[8,7.5,7.8,7,6.5,6.8,6,5.5,5.8,5,5.2,4.8,4.5,4,8.5,7.2,6.3,6.5,5,4.5,4.2,7,5.5,6,7.8,5.5,8.2,6.2,9.5,8,7.5,10,2,3,9,1.5];
const clnX=[1.5,2,2.5,3,3.5,4,4.5,5,5.5,6,6.5,7,7.5,1.8,2.2,2.7,3.3,3.8,4.1,4.3,4.6,5.2,5.8,6.3,6.8,7.1];
const clnY=[8,7.5,7.8,7,6.5,6.8,6,5.5,5.8,5,5.2,4.8,4.5,8.2,7.2,7.8,6.3,7,6.5,6.2,5.5,5,6,4.5,5.5,4.2];

function linReg(x,y){const n=x.length;let sx=0,sy=0,sxy=0,sx2=0;for(let i=0;i<n;i++){sx+=x[i];sy+=y[i];sxy+=x[i]*y[i];sx2+=x[i]*x[i];}return{slope:(n*sxy-sx*sy)/(n*sx2-sx*sx),intercept:(sy*sx2-sx*sxy)/(n*sx2-sx*sx)};}
function corrR(x,y){const n=x.length,mx=x.reduce((a,b)=>a+b,0)/n,my=y.reduce((a,b)=>a+b,0)/n;let num=0,dx2=0,dy2=0;for(let i=0;i<n;i++){const dx=x[i]-mx,dy=y[i]-my;num+=dx*dy;dx2+=dx*dx;dy2+=dy*dy;}return num/Math.sqrt(dx2*dy2);}
function r2(x,y,reg){const n=y.length,my=y.reduce((a,b)=>a+b,0)/n;let ss=0,sr=0;for(let i=0;i<n;i++){const yh=reg.slope*x[i]+reg.intercept;ss+=(y[i]-my)**2;sr+=(y[i]-yh)**2;}return 1-sr/ss;}

const rReg=linReg(rawX,rawY), rR=corrR(rawX,rawY), rR2=r2(rawX,rawY,rReg);
const cReg=linReg(clnX,clnY), cR=corrR(clnX,clnY), cR2=r2(clnX,clnY,cReg);

// 적절한 SE 기반 95% 신뢰 구간
const n=clnX.length, xBar=clnX.reduce((a,b)=>a+b,0)/n;
const SSx=clnX.reduce((a,xi)=>a+(xi-xBar)**2,0);
let ssRes=0;for(let i=0;i<n;i++){ssRes+=(clnY[i]-(cReg.slope*clnX[i]+cReg.intercept))**2;}
const s=Math.sqrt(ssRes/(n-2));

const NP=50,bX=[],bU=[],bL=[],bR=[];
for(let i=0;i<NP;i++){
  const x=1+(7*i/(NP-1));
  const yh=cReg.slope*x+cReg.intercept;
  const se=s*Math.sqrt(1/n+(x-xBar)**2/SSx);
  bX.push(x);bR.push(yh);bU.push(yh+1.96*se);bL.push(yh-1.96*se);
}

const mob=window.innerWidth<600;
const data=[
  {x:rawX,y:rawY,mode:'markers',type:'scatter',name:'원본 데이터',
   marker:{color:'rgba(148,163,184,0.5)',size:mob?7:9,line:{color:'rgba(148,163,184,0.7)',width:1}},
   hovertemplate:'스마트폰: %{x}시간<br>수면: %{y}시간<extra></extra>',visible:true},
  {x:bX,y:bU,mode:'lines',type:'scatter',line:{color:'transparent'},showlegend:false,hoverinfo:'skip',visible:false},
  {x:bX,y:bL,mode:'lines',type:'scatter',fill:'tonexty',fillcolor:'rgba(99,102,241,0.12)',line:{color:'transparent'},name:'95% 신뢰 구간',hoverinfo:'skip',visible:false},
  {x:clnX,y:clnY,mode:'markers',type:'scatter',name:'정제 데이터',
   marker:{color:'rgba(99,102,241,0.7)',size:mob?8:10,line:{color:'#4338ca',width:1.5}},
   hovertemplate:'스마트폰: %{x}시간<br>수면: %{y}시간<extra></extra>',visible:false},
  {x:bX,y:bR,mode:'lines',type:'scatter',name:'추세선 (r='+cR.toFixed(2)+')',
   line:{color:'#8b5cf6',width:2.5,dash:'dash'},hoverinfo:'skip',visible:false}
];

const fs=mob?13:17;
const layout={
  title:{text:'검증 전: 원본 데이터 (r='+rR.toFixed(2)+')',font:{family:'Noto Sans KR',size:fs,weight:700,color:'#1e1b4b'}},
  xaxis:{title:{text:'스마트폰 사용시간 (시간)',font:{size:mob?11:14,color:'#1e1b4b'}},tickfont:{size:mob?10:12,color:'#6b7280'},range:[0,11],gridcolor:'#f0f0f5',zerolinecolor:'#f0f0f5'},
  yaxis:{title:{text:'수면시간 (시간)',font:{size:mob?11:14,color:'#1e1b4b'}},tickfont:{size:mob?10:12,color:'#6b7280'},range:[0,11],gridcolor:'#f0f0f5',zerolinecolor:'#f0f0f5'},
  legend:{font:{size:mob?10:12,color:'#1e1b4b'},x:mob?0.4:0.65,y:0.98,bgcolor:'rgba(255,255,255,0.95)',bordercolor:'#f0f0f5',borderwidth:1},
  updatemenus:[{type:'buttons',direction:mob?'down':'right',x:0.5,xanchor:'center',y:mob?1.18:1.13,showactive:true,active:0,
    font:{family:'Noto Sans KR',size:mob?11:13,color:'#1e1b4b'},bgcolor:'#fafbfe',bordercolor:'#e0e7ff',borderwidth:1,
    buttons:[
      {label:'\uD83D\uDD0D 검증 전 (원본)',method:'update',args:[{visible:[true,false,false,false,false]},{title:{text:'검증 전: 원본 데이터 (r='+rR.toFixed(2)+')',font:{family:'Noto Sans KR',size:fs,weight:700,color:'#1e1b4b'}}}]},
      {label:'\u2705 검증 후 (정제)',method:'update',args:[{visible:[false,true,true,true,true]},{title:{text:'검증 후: 정제 데이터 (r='+cR.toFixed(2)+')',font:{family:'Noto Sans KR',size:fs,weight:700,color:'#1e1b4b'}}}]}
    ]}],
  margin:mob?{l:45,r:10,t:90,b:50}:{l:70,r:40,t:80,b:60},
  paper_bgcolor:'#ffffff',plot_bgcolor:'#fafbfe'
};

Plotly.newPlot('chart',data,layout,{responsive:true,displayModeBar:false});

function updateBar(st){
  const eN=document.getElementById('sN'),eR2=document.getElementById('sR2'),eR=document.getElementById('sR'),eD=document.getElementById('sDelta');
  if(st==='raw'){eN.textContent=rawX.length+'개';eR2.textContent=rR2.toFixed(3);eR.textContent=rR.toFixed(2);eD.textContent='-';
    [eR2,eR,eD].forEach(e=>e.classList.remove('improved'));
  }else{eN.textContent=clnX.length+'개';eR2.textContent=cR2.toFixed(3);eR.textContent=cR.toFixed(2);
    eD.textContent='|r| +'+(Math.abs(cR)-Math.abs(rR)).toFixed(2);
    [eR2,eR,eD].forEach(e=>e.classList.add('improved'));
  }
}
updateBar('raw');
document.getElementById('chart').on('plotly_buttonclicked',e=>updateBar(e.active===0?'raw':'clean'));
</script>
</body>
</html>
