<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { width:100%; height:100%; font-family:'Noto Sans KR',sans-serif; background:#ffffff; overflow:hidden; }
  #container { width:100%; height:100%; display:flex; flex-direction:column; }
  #chart { flex:1; min-height:0; }
  #infoBar {
    flex-shrink:0; height:46px;
    background:linear-gradient(135deg,#f8faff 0%,#eef2ff 100%);
    border-top:1px solid #e0e7ff;
    display:flex; align-items:center; justify-content:center; gap:20px;
    font-size:13px;
  }
  .ib-item { display:flex; align-items:center; gap:5px; }
  .ib-label { color:#6b7280; font-size:11px; }
  .ib-value { color:#1e1b4b; font-weight:700; font-size:14px; }
  .ib-divider { width:1px; height:18px; background:#c7d2fe; }
  .ib-up { color:#dc2626; }
  @media(max-width:600px){
    #infoBar { height:40px; gap:8px; }
    .ib-label { font-size:10px; } .ib-value { font-size:12px; }
  }
</style>
</head>
<body>
<div id="container">
  <div id="chart"></div>
  <div id="infoBar">
    <div class="ib-item"><span class="ib-label">기간</span><span class="ib-value">2015-2025</span></div>
    <div class="ib-divider"></div>
    <div class="ib-item"><span class="ib-label">10년 변화</span><span class="ib-value ib-up">+1.0°C</span></div>
    <div class="ib-divider"></div>
    <div class="ib-item"><span class="ib-label">최저</span><span class="ib-value">25.3°C (2017)</span></div>
    <div class="ib-divider"></div>
    <div class="ib-item"><span class="ib-label">최고</span><span class="ib-value ib-up">26.5°C (2025)</span></div>
  </div>
</div>
<script>
const years = [2015, 2016, 2017, 2018, 2019, 2020, 2021, 2022, 2023, 2024, 2025];
const temps = [25.5, 25.8, 25.3, 26.1, 25.7, 26.0, 25.9, 26.3, 26.0, 26.4, 26.5];

const n = years.length;
const sumX = years.reduce((a, b) => a + b, 0);
const sumY = temps.reduce((a, b) => a + b, 0);
const sumXY = years.reduce((acc, x, i) => acc + x * temps[i], 0);
const sumX2 = years.reduce((acc, x) => acc + x * x, 0);

const slope = (n * sumXY - sumX * sumY) / (n * sumX2 - sumX * sumX);
const intercept = (sumY - slope * sumX) / n;
const regression = years.map(x => Math.round((slope * x + intercept) * 100) / 100);

const isMobile = window.innerWidth < 600;

const data = [
  {
    x: years, y: temps, type: 'scatter', mode: 'none',
    fill: 'tozeroy', fillcolor: 'rgba(99,102,241,0.08)',
    showlegend: false, hoverinfo: 'skip'
  },
  {
    x: years, y: temps, type: 'scatter', mode: 'lines+markers',
    name: '실측 기온',
    line: { color: '#6366f1', width: 2.5 },
    marker: { size: isMobile ? 7 : 9, color: '#6366f1', line: { color: '#fff', width: 1.5 } },
    hovertemplate: '%{x}년<br>평균기온: %{y}°C<extra></extra>'
  },
  {
    x: years, y: regression, type: 'scatter', mode: 'lines',
    name: '추세선 (선형 회귀)',
    line: { color: '#8b5cf6', width: 2, dash: 'dash' },
    hovertemplate: '%{x}년<br>추세값: %{y:.2f}°C<extra></extra>'
  }
];

const layout = {
  title: {
    text: '서울 8월 평균기온 추세 (2015-2025)',
    font: { family: 'Noto Sans KR', size: isMobile ? 15 : 20, weight: 700, color: '#1e1b4b' },
    y: 0.96
  },
  xaxis: {
    title: { text: '연도', font: { family: 'Noto Sans KR', size: isMobile ? 12 : 14, color: '#1e1b4b' } },
    tickfont: { family: 'Noto Sans KR', size: isMobile ? 10 : 12, color: '#6b7280' },
    dtick: isMobile ? 2 : 1, range: [2014.5, 2025.5],
    gridcolor: '#f0f0f5', linecolor: '#f0f0f5', zerolinecolor: '#f0f0f5'
  },
  yaxis: {
    title: { text: '평균기온 (°C)', font: { family: 'Noto Sans KR', size: isMobile ? 12 : 14, color: '#1e1b4b' } },
    tickfont: { family: 'Noto Sans KR', size: isMobile ? 10 : 12, color: '#6b7280' },
    range: [24.5, 27.5],
    gridcolor: '#f0f0f5', linecolor: '#f0f0f5', zerolinecolor: '#f0f0f5'
  },
  legend: {
    font: { family: 'Noto Sans KR', size: isMobile ? 10 : 12, color: '#1e1b4b' },
    x: 0.02, y: 0.98, bgcolor: 'rgba(255,255,255,0.9)', bordercolor: '#f0f0f5', borderwidth: 1
  },
  annotations: [{
    x: 2022, y: 27.2, xref: 'x', yref: 'y',
    text: '<b>10년간 +1.0°C 상승</b>',
    showarrow: true, arrowhead: 2, arrowsize: 1, arrowwidth: 2, arrowcolor: '#8b5cf6',
    ax: 0, ay: -40,
    font: { family: 'Noto Sans KR', size: isMobile ? 11 : 14, color: '#8b5cf6' },
    bgcolor: 'rgba(255,255,255,0.95)', bordercolor: '#8b5cf6', borderwidth: 1, borderpad: isMobile ? 4 : 6
  }],
  margin: isMobile ? { l: 50, r: 15, t: 50, b: 50 } : { l: 70, r: 40, t: 60, b: 55 },
  paper_bgcolor: '#ffffff', plot_bgcolor: '#fafbfe'
};

Plotly.newPlot('chart', data, layout, { responsive: true, displayModeBar: false });
</script>
</body>
</html>
