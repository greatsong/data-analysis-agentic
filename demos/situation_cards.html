<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>데이터 분석 상황 카드</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: #f8f9fa;
    min-height: 100vh;
    padding: 40px 20px;
  }
  .page-title {
    text-align: center;
    font-size: 1.5rem;
    font-weight: 700;
    color: #1a1a2e;
    margin-bottom: 8px;
  }
  .page-subtitle {
    text-align: center;
    font-size: 0.95rem;
    color: #6c757d;
    margin-bottom: 36px;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 24px;
    max-width: 1000px;
    margin: 0 auto;
  }
  @media (max-width: 768px) {
    .grid { grid-template-columns: repeat(2, 1fr); }
  }
  @media (max-width: 500px) {
    .grid { grid-template-columns: 1fr; }
  }

  .card-wrapper {
    perspective: 1000px;
    height: 320px;
    cursor: pointer;
  }
  .card {
    position: relative;
    width: 100%;
    height: 100%;
    transition: transform 0.6s ease;
    transform-style: preserve-3d;
  }
  .card-wrapper.flipped .card {
    transform: rotateY(180deg);
  }
  .card-face {
    position: absolute;
    width: 100%;
    height: 100%;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 4px 20px rgba(0,0,0,0.08);
  }

  /* Front */
  .card-front {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 28px 24px;
    text-align: center;
    background: #fff;
  }
  .card-front .emoji {
    font-size: 3rem;
    margin-bottom: 12px;
  }
  .card-front .category {
    display: inline-block;
    padding: 4px 14px;
    border-radius: 20px;
    color: #fff;
    font-size: 0.8rem;
    font-weight: 500;
    margin-bottom: 16px;
    letter-spacing: 0.5px;
  }
  .card-front .situation {
    font-size: 1.05rem;
    font-weight: 500;
    color: #333;
    line-height: 1.6;
    margin-bottom: 20px;
  }
  .card-front .hint {
    font-size: 0.78rem;
    color: #adb5bd;
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .card-front .hint::before {
    content: '👆';
    font-size: 0.85rem;
  }
  .card-front .top-bar {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 5px;
  }

  /* Back */
  .card-back {
    transform: rotateY(180deg);
    padding: 24px;
    background: #fff;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }
  .card-back .top-bar {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 5px;
  }
  .card-back .section-label {
    font-size: 0.75rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 6px;
    margin-top: 14px;
  }
  .card-back .section-label:first-child {
    margin-top: 0;
  }
  .card-back .question {
    font-size: 0.95rem;
    font-weight: 500;
    color: #333;
    line-height: 1.5;
    padding: 8px 12px;
    background: #f8f9fa;
    border-radius: 8px;
    border-left: 3px solid;
  }
  .card-back ul {
    list-style: none;
    padding: 0;
    margin: 4px 0 0 0;
  }
  .card-back ul li {
    font-size: 0.85rem;
    color: #555;
    padding: 2px 0;
    padding-left: 16px;
    position: relative;
  }
  .card-back ul li::before {
    content: '•';
    position: absolute;
    left: 4px;
    font-weight: bold;
  }
  .card-back .source {
    font-size: 0.85rem;
    color: #555;
    margin-top: 4px;
  }
</style>
</head>
<body>

<h1 class="page-title">데이터 분석 상황 카드</h1>
<p class="page-subtitle">카드를 클릭하면 분석 질문과 필요 데이터를 확인할 수 있습니다</p>

<div class="grid" id="cardGrid"></div>

<script>
const cards = [
  {
    emoji: '🏫',
    category: '학교생활',
    color: '#4361ee',
    situation: '"우리 학교 학생들이 잠을 너무 못 자는 것 같아요"',
    question: '학년별 수면시간에 차이가 있는가?',
    data: ['학년 (1, 2, 3학년)', '일평균 수면시간', '표본 90명 이상'],
    source: '학교 설문조사'
  },
  {
    emoji: '🌍',
    category: '환경',
    color: '#2ec4b6',
    situation: '"여름이 점점 더 더워지는 것 같아요"',
    question: '서울 여름 평균기온이 10년간 올랐는가?',
    data: ['연도 (2015~2025)', '월별 평균기온', '측정 지역: 서울'],
    source: '기상청 공공데이터'
  },
  {
    emoji: '💪',
    category: '건강',
    color: '#e63946',
    situation: '"스마트폰을 많이 하면 피곤한 것 같아요"',
    question: '스마트폰 사용시간과 피로도의 상관관계가 있는가?',
    data: ['일평균 스마트폰 사용시간', '자기보고 피로도 (1~10)'],
    source: '학교 설문조사'
  },
  {
    emoji: '💰',
    category: '경제',
    color: '#f4a261',
    situation: '"용돈이 항상 부족한 것 같아요"',
    question: '고등학생 월평균 지출은 용돈의 몇 %인가?',
    data: ['월 용돈 금액', '항목별 지출 금액', '저축 금액'],
    source: '직접 설문조사'
  },
  {
    emoji: '🎭',
    category: '문화',
    color: '#9b5de5',
    situation: '"요즘 다들 같은 노래만 듣는 것 같아요"',
    question: '연령대별 음악 장르 선호도에 차이가 있는가?',
    data: ['연령대', '선호 음악 장르', '주간 청취 시간'],
    source: '설문 + 스트리밍 데이터'
  },
  {
    emoji: '💻',
    category: '기술',
    color: '#00b4d8',
    situation: '"AI가 모든 걸 대신해줄 것 같아요"',
    question: 'AI 활용 빈도와 학습 효과는 관련이 있는가?',
    data: ['주간 AI 사용 빈도', '과목별 성적 변화', '자기효능감 점수'],
    source: '학교 설문조사'
  }
];

const grid = document.getElementById('cardGrid');

cards.forEach((c) => {
  const wrapper = document.createElement('div');
  wrapper.className = 'card-wrapper';
  wrapper.addEventListener('click', () => wrapper.classList.toggle('flipped'));

  wrapper.innerHTML = `
    <div class="card">
      <div class="card-face card-front">
        <div class="top-bar" style="background:${c.color}"></div>
        <div class="emoji">${c.emoji}</div>
        <span class="category" style="background:${c.color}">${c.category}</span>
        <p class="situation">${c.situation}</p>
        <span class="hint">클릭하여 뒤집기</span>
      </div>
      <div class="card-face card-back">
        <div class="top-bar" style="background:${c.color}"></div>
        <div class="section-label" style="color:${c.color}">예시 분석 질문:</div>
        <div class="question" style="border-left-color:${c.color}">${c.question}</div>
        <div class="section-label" style="color:${c.color}">필요 데이터:</div>
        <ul>${c.data.map(d => `<li style="color:#444">${d}</li>`).join('')}</ul>
        <div class="section-label" style="color:${c.color}">데이터 출처:</div>
        <p class="source">${c.source}</p>
      </div>
    </div>
  `;

  grid.appendChild(wrapper);
});
</script>
</body>
</html>
