<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { width:100%; height:100%; font-family:'Noto Sans KR',sans-serif; background:#ffffff; overflow:hidden; }
  #chart { width:100%; height:100%; }
</style>
</head>
<body>
<div id="chart"></div>
<script>
// 시드 기반 결정적 난수 생성기 (매번 동일한 데이터 보장)
let _seed = 2026;
function seededRandom() { _seed = (_seed * 16807) % 2147483647; return _seed / 2147483647; }

function generateBoxData(median, spread, count, min, max) {
  const data = [];
  for (let i = 0; i < count; i++) {
    // Box-Muller 변환으로 정규분포 근사
    const u1 = seededRandom();
    const u2 = seededRandom();
    const z = Math.sqrt(-2 * Math.log(u1)) * Math.cos(2 * Math.PI * u2);
    let val = median + z * spread;
    val = Math.max(min, Math.min(max, val));
    data.push(Math.round(val * 10) / 10);
  }
  return data;
}

const groups = ['5시간 미만', '5-6시간', '6-7시간', '7-8시간', '8시간 이상'];
const medians = [3.5, 4.8, 6.2, 7.5, 7.8];
const spreads = [0.8, 1.0, 1.1, 1.0, 0.9];
const colors = ['#6366f1', '#8b5cf6', '#06b6d4', '#10b981', '#f59e0b'];
const markerColors = [
  'rgba(99,102,241,0.5)',
  'rgba(139,92,246,0.5)',
  'rgba(6,182,212,0.5)',
  'rgba(16,185,129,0.5)',
  'rgba(245,158,11,0.5)'
];

// 모바일 감지
const isMobile = window.innerWidth < 600;

const data = groups.map((group, i) => {
  const values = generateBoxData(medians[i], spreads[i], 30, 1, 10);
  return {
    y: values,
    x: Array(values.length).fill(group),
    type: 'box',
    name: group,
    boxpoints: 'all',
    jitter: 0.4,
    pointpos: -1.5,
    marker: {
      color: markerColors[i],
      size: isMobile ? 4 : 5,
      line: { color: colors[i], width: 1 }
    },
    line: { color: colors[i], width: 2 },
    fillcolor: colors[i] + '20',
    hovertemplate: '%{x}<br>만족도: %{y}<extra></extra>'
  };
});

const layout = {
  title: {
    text: '수면시간 구간별 학교생활 만족도',
    font: { family: 'Noto Sans KR', size: isMobile ? 15 : 20, weight: 700, color: '#1e1b4b' },
    y: 0.96
  },
  xaxis: {
    title: { text: '수면시간 구간', font: { family: 'Noto Sans KR', size: isMobile ? 11 : 14, color: '#1e1b4b' } },
    tickfont: { family: 'Noto Sans KR', size: isMobile ? 9 : 12, color: '#6b7280' },
    tickangle: isMobile ? -30 : 0
  },
  yaxis: {
    title: { text: '학교생활 만족도', font: { family: 'Noto Sans KR', size: isMobile ? 11 : 14, color: '#1e1b4b' } },
    tickfont: { family: 'Noto Sans KR', size: isMobile ? 10 : 12, color: '#6b7280' },
    range: [0, 11],
    dtick: 2,
    gridcolor: '#f0f0f5',
    linecolor: '#f0f0f5',
    zerolinecolor: '#f0f0f5'
  },
  showlegend: false,
  annotations: [{
    x: '7-8시간',
    y: 10.2,
    xref: 'x',
    yref: 'y',
    text: '<b>7시간 이상 수면 → 만족도 급상승!</b>',
    showarrow: true,
    arrowhead: 2,
    arrowsize: 1,
    arrowwidth: 2,
    arrowcolor: '#10b981',
    ax: isMobile ? -15 : -30,
    ay: -30,
    font: { family: 'Noto Sans KR', size: isMobile ? 11 : 13, color: '#10b981' },
    bgcolor: 'rgba(255,255,255,0.95)',
    bordercolor: '#10b981',
    borderwidth: 1,
    borderpad: isMobile ? 4 : 6
  }],
  margin: isMobile
    ? { l: 45, r: 10, t: 50, b: 65 }
    : { l: 70, r: 30, t: 60, b: 70 },
  paper_bgcolor: '#ffffff',
  plot_bgcolor: '#fafbfe'
};

Plotly.newPlot('chart', data, layout, { responsive: true, displayModeBar: false });
</script>
</body>
</html>
