<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { width:100%; height:100%; font-family:'Noto Sans KR',sans-serif; background:#ffffff; overflow:hidden; }
  #chart { width:100%; height:100%; }
</style>
</head>
<body>
<div id="chart"></div>
<script>
const labels = ['스마트폰', '수면', '피로도', '만족도', '운동', '공부', '성적'];

// 7x7 상관계수 행렬 (대칭)
const matrix = [
  [ 1.00, -0.45,  0.52, -0.18,-0.22,  -0.30, -0.25],
  [-0.45,  1.00, -0.38,  0.28,  0.15,   0.20,  0.18],
  [ 0.52, -0.38,  1.00, -0.30, -0.25,  -0.15, -0.20],
  [-0.18,  0.28, -0.30,  1.00,  0.40,   0.22,  0.30],
  [-0.22,  0.15, -0.25,  0.40,  1.00,   0.10,  0.12],
  [-0.30,  0.20, -0.15,  0.22,  0.10,   1.00,  0.55],
  [-0.25,  0.18, -0.20,  0.30,  0.12,   0.55,  1.00]
];

// 셀에 표시할 텍스트 생성
const textMatrix = matrix.map(row =>
  row.map(val => val.toFixed(2))
);

// 모바일 감지
const isMobile = window.innerWidth < 600;

const data = [{
  z: matrix,
  x: labels,
  y: labels,
  type: 'heatmap',
  colorscale: [
    [0, '#06b6d4'],
    [0.25, '#a5f3fc'],
    [0.5, '#fafbfe'],
    [0.75, '#a5b4fc'],
    [1, '#6366f1']
  ],
  zmin: -1,
  zmax: 1,
  text: textMatrix,
  texttemplate: '%{text}',
  textfont: { family: 'Noto Sans KR', size: isMobile ? 10 : 13, color: '#1e1b4b' },
  hovertemplate: '%{y} ↔ %{x}<br>상관계수: %{z:.2f}<extra></extra>',
  colorbar: {
    title: { text: '상관계수', font: { family: 'Noto Sans KR', size: 13, color: '#1e1b4b' } },
    tickfont: { family: 'Noto Sans KR', size: 11, color: '#6b7280' },
    thickness: isMobile ? 12 : 15,
    len: 0.75,
    outlinewidth: 0
  }
}];

const layout = {
  title: {
    text: '변수 간 상관계수 히트맵',
    font: { family: 'Noto Sans KR', size: isMobile ? 16 : 20, weight: 700, color: '#1e1b4b' },
    y: 0.97
  },
  xaxis: {
    tickfont: { family: 'Noto Sans KR', size: isMobile ? 10 : 13, color: '#1e1b4b' },
    side: 'bottom',
    tickangle: isMobile ? -45 : 0
  },
  yaxis: {
    tickfont: { family: 'Noto Sans KR', size: isMobile ? 10 : 13, color: '#1e1b4b' },
    autorange: 'reversed'
  },
  margin: isMobile
    ? { l: 55, r: 40, t: 50, b: 55 }
    : { l: 80, r: 80, t: 60, b: 60 },
  paper_bgcolor: '#ffffff',
  plot_bgcolor: '#ffffff'
};

Plotly.newPlot('chart', data, layout, { responsive: true, displayModeBar: false });
</script>
</body>
</html>
